hostnames:
  - node01.example.lab
  - node02.example.lab
  - node03.example.lab

vlans:
  - id: 100
    ips:
      - 192.168.1.1
      - 192.168.1.2
      - 192.168.1.3
    prefixLength: 24

  - id: 101
    ips:
      - 192.168.2.1
      - 192.168.2.2
      - 192.168.2.3
    prefixLength: 24

mtu:
  value: 9000
  interfaces:
    - name: eno1
      type: ethernet
    - name: eno2
      type: ethernet
    - name: bond0
      type: bond